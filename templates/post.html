<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{TITLE}} · grad.log</title>
  <meta name="description" content="{{SUMMARY}}">
  <meta property="og:title" content="{{TITLE}}">
  <meta property="og:description" content="{{SUMMARY}}">
  <meta property="og:type" content="article">
  <meta property="og:url" content="https://songhyun9999.github.io/grad.log/posts/{{SLUG}}.html">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap">
  <link rel="stylesheet" href="../assets/style.css">
  <!-- KaTeX: 수식이 있는 글에서만 아래 3줄 유지, 없으면 삭제 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'\\(',right:'\\)',display:false}]});"></script>
</head>
<body>
<header class="site-header">
  <a class="site-name" href="../index.html">grad.log</a>
  <nav class="site-nav">
    <a href="../index.html">Home</a>
    <a href="../archive.html">Archive</a>
    <a href="../about.html">About</a>
  </nav>
</header>
<main>
  <header class="post-header">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{TITLE}}</h1>
    <div class="meta">
      <time datetime="{{DATE}}">{{DATE}}</time>
      <span>약 {{READ_MIN}}분</span>
      {{TAGS}}<!-- <span class="tag">태그</span> 반복 -->
    </div>
    <p class="lede">{{SUMMARY}}</p>
  </header>
  <article>
    {{CONTENT}}
  </article>
</main>
<footer class="site-footer">
  <span>© songhyun9999</span>
  <a href="../archive.html">← 전체 글</a>
</footer>
</body>
</html>
